<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub API Demo</title>
    

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <link rel="stylesheet" href="styles.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Libre+Franklin:ital,wght@0,100..900;1,100..900&family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&family=Tenor+Sans&display=swap" rel="stylesheet">

</head>
<body>

    <h1>Погода</h1>
    <button id="getLocation">Получить местоположение</button>

    <div class="container">
        <div class="row">
        </div>
    </div>

    <script>

        let getLocation = document.getElementById('getLocation');

        getLocation.addEventListener('click', askLocation);

        async function askLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(success, error);
            } else {
                alert("Геолокация не поддерживается этим браузером.");
            }
        };

        async function success(position) {
            const lat = position.coords.latitude;
            const long = position.coords.longitude;
            
            function classifyPressure(pressure) {
                if (pressure < 1000) return "слабое давление";
                if (pressure > 1020) return "повышенное давление";
                return "нормальное давление";
            }
            
            try {
                const response = await fetch(`https://api.openweathermap.org/data/2.8/onecall?lat=${lat}&lon=${long}&appid=125368aa4b1e415054613740e702ad64`);
                if (!response.ok) {
                    console.log("error");
                } else {
                    const data = await response.json();

                    let row = document.getElementsByClassName('row')[0];

                    row.innerHTML += `
                            <div class="col">
                                <h5>weather: ${data.current.weather[0].main}</h5>
                                <p>${data.current.weather[0].description}</p>
                                <p>feels like: ${Math.round(data.current.feels_like - 273.15)}°C<br>${classifyPressure(data.current.pressure)} (${data.current.pressure} hPa)</p>
                            </div>
                            <div class="col">
                                <h1>${Math.round(data.current.temp - 273.15)}°C</h1>
                            </div>
                    `;
                }
            }
            catch (error) {
                console.error("Error:", error);
            }
        }

        function error() {
            alert("Не удалось получить ваше местоположение.");
        }

    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
